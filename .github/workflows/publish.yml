name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Publish @continuous-camera/core
        run: |
          LOCAL=$(node -p "require('./packages/core/package.json').version")
          REMOTE=$(npm view @continuous-camera/core version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            pnpm --filter @continuous-camera/core publish --no-git-checks --access public
          else
            echo "core@$LOCAL already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @continuous-camera/react
        run: |
          LOCAL=$(node -p "require('./packages/react/package.json').version")
          REMOTE=$(npm view @continuous-camera/react version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            pnpm --filter @continuous-camera/react publish --no-git-checks --access public
          else
            echo "react@$LOCAL already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
